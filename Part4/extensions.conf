; extensions.conf
[general]
static=yes
writeprotect=yes

[globals]

[incoming]
; --- Gestion des SDA directes ---
exten => 0477777777,1,Goto(internal,200,1) 
exten => 0488888888,1,Goto(internal,202,1) 

; --- Numéro Principal (0466666666) ---
exten => 0466666666,1,Answer()

; Condition "En vacances" : Du 12 Juin au 31 Août
same => n,GotoIfTime(*,*,12-30,jun?vacances,1)
same => n,GotoIfTime(*,*,*,jul-aug?vacances,1)

; Condition "Heures d'ouverture" : 08:00-18:00, 7j/7, de Septembre au 11 Juin
same => n,GotoIfTime(08:00-17:59,*,*,sep-may?ivr_menu,1)
same => n,GotoIfTime(08:00-17:59,*,1-11,jun?ivr_menu,1)

; Si aucune condition ne matche, c'est que l'atelier est fermé (hors horaires)
same => n,Goto(ferme,1)

; --- Annonces Temporelles ---
exten => vacances,1,Playback(custom/annonce_vacances)
same => n,Hangup()

exten => ferme,1,Playback(custom/annonce_fermeture)
same => n,Hangup()

; --- Menu IVR ---
exten => ivr_menu,1,Background(custom/menu_principal)
same => n,WaitExten(5)

exten => 0,1,Goto(internal,200,1)
exten => 1,1,Goto(internal,201,1)
exten => 2,1,Goto(internal,202,1)
exten => 3,1,Goto(internal,203,1)

; Gestion des erreurs de saisie dans l'IVR
exten => i,1,Playback(invalid)
same => n,Goto(ivr_menu,1)

exten => t,1,Hangup()

[internal]
; --- Appel Interne et Gestion Messagerie (ABSENT) ---
exten => _20X,1,Dial(PJSIP/${EXTEN},20)
; On vérifie le statut du dial. S'il est injoignable (softphone fermé/absent) ou occupé.
same => n,GotoIf($["${DIALSTATUS}" = "CHANUNAVAIL"]?voicemail)
same => n,GotoIf($["${DIALSTATUS}" = "BUSY"]?voicemail)
same => n,GotoIf($["${DIALSTATUS}" = "NOANSWER"]?voicemail)
same => n,Hangup()

same => n(voicemail),VoiceMail(${EXTEN}@default,u)
same => n,Hangup()

; Code d'accès pour écouter ses messages
exten => *97,1,VoiceMailMain(${CALLERID(num)}@default)
same => n,Hangup()